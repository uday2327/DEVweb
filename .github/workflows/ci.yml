name: Web App CI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Debug info (show files and Python)
        run: |
          python --version
          pip --version
          pwd
          ls -la
          cat requirements.txt || true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest -q

      - name: Build Application
        run: |
          echo "Building Application (placeholder)"
