name: Python Matrix CI

on:
  push:

jobs:

  test:

    runs-on: ubuntu-latest

    strategy:

      matrix:

        python-version: [3.9, 3.10, 3.11, 3.12]

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run Python Command
        run: python --version